<!-- Chat Pane — LLM mode -->
<div class="flex h-full overflow-hidden w-full">

  <!-- Left/Middle: Images -->
  <div class="flex-1 min-w-0 flex flex-col p-6 bg-gray-950 border-r border-gray-800 overflow-y-auto custom-scrollbar">
    <!-- Image Compare Grid (supports multiple image slots) -->
    {% include "partials/image_compare.html" %}
  </div>

  <!-- Right: Chat Panel (resizable — drag left edge; animated halo while the loop runs) -->
  <div class="relative shrink-0 flex flex-col h-full bg-gray-900 p-4 gap-3"
       :class="{'llm-halo': running}"
       :style="`width: ${panelWidthPct}%`">
    <div class="panel-resize-handle" :class="{'dragging': panelDragging}" @mousedown.prevent="startPanelDrag($event)" title="Drag to resize"></div>
    
    <!-- Toolbar -->
    <div class="flex items-center justify-between shrink-0">
      <div class="flex items-center gap-2">
        <span class="badge-llm">AI</span>
        <span class="text-xs text-gray-500" x-text="window.images.length > 1 ? `Batch: ${window.images.length} images` : (window.image_id ? 'Image: ' + window.image_id.slice(0, 8) + '...' : '')"></span>
      </div>
      <div class="flex items-center gap-3">
        <button @click="$store.shareDialog.open(window.window_id)" class="text-xs text-gray-500 hover:text-indigo-400 transition-colors flex items-center gap-1" title="Share window">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
          </svg>
          Share
        </button>
        <button @click="showMeta = !showMeta" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">
          <span x-text="showMeta ? 'Hide' : 'Show'"></span> Metadata
        </button>
      </div>
    </div>

    <!-- Collapsible Metadata -->
    <div x-show="showMeta" x-transition class="shrink-0">
      <div x-data="{ metadata: window.metadata, copied: false, copyMetadata() { navigator.clipboard.writeText(JSON.stringify(this.metadata, null, 2)); this.copied = true; setTimeout(() => this.copied = false, 2000); } }">
        {% include "partials/metadata_block.html" %}
      </div>
    </div>

    <!-- Chat History -->
    <div class="flex-1 overflow-y-auto overflow-x-hidden custom-scrollbar space-y-3 pr-1 min-w-0 break-words" x-ref="chatHistory">
      <template x-for="(msg, i) in messages" :key="i">
        <div class="flex w-full" :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
          
          <!-- USER MESSAGE -->
          <template x-if="msg.role === 'user'">
            <div class="bg-indigo-700 text-white rounded-xl rounded-tr-sm px-4 py-2 max-w-[85%] text-sm whitespace-pre-wrap" x-text="msg.content"></div>
          </template>

          <!-- ASSISTANT CHAT BUBBLE -->
          <template x-if="msg.role === 'assistant' && msg.response_type === 'chat'">
            <div class="bg-gray-800 text-gray-100 rounded-xl rounded-tl-sm px-4 py-2 max-w-[85%] text-sm flex flex-col gap-2 shadow-sm border border-gray-700/50">
              <!-- Rendered markdown (code fences, math, mermaid) -->
              <div x-markdown="msg.content"></div>
              <!-- Optional illustrative code snippet -->
              <template x-if="msg.code">
                <div class="bg-[#282a36] p-3 rounded border border-gray-700 mt-1 relative group">
                  <pre class="dracula-block text-xs m-0"><code x-highlight="msg.code"></code></pre>
                  <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
                    <button @click="runSnippet(msg.code)" class="px-2 py-1 bg-indigo-600 hover:bg-indigo-500 rounded text-xs text-white shadow" title="Run in Sandbox">Run</button>
                    <button @click="$store.codeDialog.open('Illustrative Snippet', 'Generated by LLM', msg.code, 'viewer')" class="px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs text-white shadow">View Full</button>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- ASSISTANT CODE CARD -->
          <template x-if="msg.role === 'assistant' && msg.response_type === 'code'">
            <div class="bg-gray-800 text-gray-100 rounded-xl rounded-tl-sm w-full max-w-full text-sm flex flex-col shadow-sm border border-gray-700/50 overflow-hidden">
              <div class="px-4 py-3 bg-gray-900/50 border-b border-gray-700/50 flex items-start justify-between gap-4">
                <div class="flex-1 text-gray-300" x-markdown="msg.content"></div>
                <button @click="$store.codeDialog.open('Generated Code', 'Executed by sandbox', msg.code, 'viewer')" class="shrink-0 text-xs text-indigo-400 hover:text-indigo-300 font-medium px-2 py-1 bg-indigo-500/10 rounded">Preview Code</button>
              </div>
              
              <!-- Execution status strip -->
              <template x-if="!msg.was_executed">
                <div class="px-4 py-2 bg-amber-500/10 text-amber-500/80 text-xs font-mono flex items-center gap-2">
                  <span class="animate-spin w-3 h-3 border-2 border-amber-500/50 border-t-transparent rounded-full"></span> Running...
                </div>
              </template>
              <template x-if="msg.was_executed && msg.execution_result">
                <div class="px-4 py-2 flex items-center gap-2 text-xs font-mono" 
                     :class="msg.execution_result.file_exists ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'">
                  <span x-text="msg.execution_result.file_exists ? '✓ Run Succeeded' : '✗ Run Failed'"></span>
                  <span class="text-gray-500 ml-auto" x-text="`${msg.execution_result.time_taken_seconds?.toFixed(2) || '0.00'}s`"></span>
                </div>
              </template>
            </div>
          </template>

          <!-- ASSISTANT ERROR -->
          <template x-if="msg.role === 'assistant' && msg.response_type === 'error'">
            <div class="bg-red-900/20 text-red-400 border border-red-500/20 rounded-xl rounded-tl-sm px-4 py-2 max-w-[85%] text-sm whitespace-pre-wrap" x-text="msg.content"></div>
          </template>

        </div>
      </template>

      <!-- Status indicator while running -->
      <template x-if="running">
        <div class="flex justify-start">
          <div class="bg-gray-800 rounded-xl rounded-tl-sm px-4 py-2 text-sm text-indigo-300 flex items-center gap-2">
            <span class="animate-spin inline-block w-3 h-3 border-2 border-indigo-400 border-t-transparent rounded-full"></span>
            <span x-text="statusMsg || 'Working...'"></span>
          </div>
        </div>
      </template>
    </div>

    <!-- Input Area -->
    <div class="shrink-0 border-t border-gray-800 pt-3">
      <div class="flex gap-2">
        <textarea
          x-model="inputText"
          @keydown.ctrl.enter="sendMessage()"
          @keydown.meta.enter="sendMessage()"
          :disabled="running"
          placeholder="Describe a transformation... (Ctrl+Enter to send)"
          rows="2"
          class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-indigo-500 resize-none disabled:opacity-50 custom-scrollbar">
        </textarea>
        <button
          x-show="!running"
          @click="sendMessage()"
          :disabled="!inputText.trim()"
          class="btn-primary self-end px-4 py-2">
          Send
        </button>
        <button
          x-show="running"
          @click="stopLoop()"
          class="self-end px-4 py-2 bg-red-600 hover:bg-red-500 text-white text-sm font-medium rounded-xl transition-colors flex items-center gap-2"
          title="Stop the generate→execute→fix loop">
          <span class="w-2.5 h-2.5 bg-white rounded-sm"></span>
          <span class="flex items-center gap-1">Stop <span class="text-red-200 text-xs" x-text="attemptLabel"></span></span>
        </button>
      </div>
    </div>

  </div>

</div>
