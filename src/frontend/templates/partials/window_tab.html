<!-- Window Tab Bar + Active Pane -->
<div x-data="windowManager()" class="flex flex-col h-full overflow-hidden">

  <!-- Tab Bar -->
  <div class="flex items-center gap-1.5 px-4 py-2 bg-gray-900 border-b border-gray-800 overflow-x-auto shrink-0">
    <template x-for="win in windows" :key="win.window_id">
      <div class="flex items-center gap-1 shrink-0">
        <button
          @click="activateWindow(win.window_id)"
          :class="activeWindowId === win.window_id ? 'tab-btn-active' : 'tab-btn-inactive'"
          class="tab-btn">
          <!-- mode icon -->
          <template x-if="win.mode === 'llm'">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
          </template>
          <template x-if="win.mode === 'manual'">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
            </svg>
          </template>
          <span class="text-xs max-w-24 truncate" x-text="win.label || (win.mode === 'llm' ? 'LLM Chat' : 'Code Editor')"></span>
          <span :class="win.mode === 'llm' ? 'badge-llm' : 'badge-manual'" x-text="win.mode === 'llm' ? 'AI' : '<>'"></span>
        </button>
        <button
          @click.stop="closeWindow(win.window_id)"
          class="text-gray-500 hover:text-red-400 transition-colors duration-150 p-0.5 rounded ml-1"
          title="Close window">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </template>

    <!-- Empty state -->
    <template x-if="windows.length === 0">
      <span class="text-xs text-gray-600 px-2">No windows open — upload an image and click a window button</span>
    </template>
  </div>

  <!-- Active Window Content -->
  <div class="flex-1 overflow-hidden relative">
    <template x-for="win in windows" :key="win.window_id">
      <div class="absolute inset-0 bg-gray-950 flex flex-col" x-show="activeWindowId === win.window_id">
        <!-- We use x-if for mode selection (constant for the life of the window) so it only renders the correct pane -->
        <template x-if="win.mode === 'llm'">
          <div class="flex-1 min-h-0" x-data="chatPane(win)">
            {% include "partials/chat_pane.html" %}
          </div>
        </template>
        <template x-if="win.mode === 'manual'">
          <div class="flex-1 min-h-0" x-data="codeEditor(win)">
            {% include "partials/code_editor_pane.html" %}
          </div>
        </template>
      </div>
    </template>

    <template x-if="windows.length === 0">
      <div class="absolute inset-0 flex items-center justify-center bg-gray-950 text-gray-600 text-sm">
        <div class="text-center">
          <div class="text-4xl mb-3">🖼️</div>
          <p>Upload an image and open a window to get started</p>
        </div>
      </div>
    </template>
  </div>

</div>
